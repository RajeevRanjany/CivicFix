version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: civicfix-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: civicfix
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: civicfix-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mysql_data: